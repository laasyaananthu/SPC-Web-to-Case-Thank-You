<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPC | Service Request</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff5f0 0%, #ffdfd3 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(211, 84, 0, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 5px;
        }

        .logo-container img {
            max-width: 110px;
            height: auto;
        }

        .brand-header {
            color: #d35400; 
            margin: 0;
            font-size: 22px; 
            font-weight: 700;
            line-height: 1.2;
        }
        
        .caption {
            color: #95a5a6;
            margin: 4px 0 25px 0;
            font-size: 13px;
            font-weight: 400;
        }

        form { text-align: left; }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #444;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .btn-submit {
            background: linear-gradient(90deg, #ff9a7b, #d35400);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(211, 84, 0, 0.2);
        }
    </style>
</head>
<body>

<div class="form-card">
    <div class="logo-container">
        <img src="SPC logo.png" alt="SPC Logo">
    </div>

    <h1 class="brand-header">Southern Peach Construction</h1>
    <h1 class="brand-header">Request Form</h1>
    <p class="caption">Please fill out the form.</p>


        <input type="hidden" name="retURL" value="thank you.html">

        

        <label for="name">Contact Name *</label>
        <input id="name" name="name" type="text" placeholder="Full Name" required />

        <label for="email">Email Address *</label>
        <input id="email" name="email" type="email" placeholder="name@example.com" required />

        <label for="subject">Issue Subject *</label>
        <input id="subject" name="subject" type="text" placeholder="What needs attention?" required />

        <label for="description">Message *</label>
        <textarea name="description" rows="3" placeholder="Tell us more..." required></textarea>

        <label for="priority">Urgency *</label>
        <select id="priority" name="priority" required>
            <option value="">-- Select Urgency --</option>
            <option value="Low">Low - Cosmetic</option>
            <option value="Medium">Medium - Standard</option>
            <option value="High">High - Emergency</option>
        </select>

        <button type="submit" class="btn-submit">Submit Request</button>
    </form>
</div>

</body>
</html>
