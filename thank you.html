<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Southern Peach</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff5f0 0%, #ffdfd3 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #444;
        }

        .message-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(211, 84, 0, 0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container { margin-bottom: 15px; }
        .logo-container img { max-width: 100px; height: auto; }

        .brand-header {
            color: #d35400; 
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
        }

        .image-container {
            margin: 15px auto; /* Reduced margins */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(211, 84, 0, 0.1);
            max-width: 500px; /* Limits the width of the image */
        }

        .image-container img {
            width: 100%;
            max-height: 500px; /* Limits the height so you don't have to scroll */
            object-fit: cover; /* Keeps the image looking good even when resized */
            display: block;
        
        }

        .content {
            background: #fff9f6;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #ff9a7b;
            text-align: left;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .quote {
            font-style: italic;
            color: #d35400;
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 25px;
        }

        .btn-back {
            display: inline-block;
            background: linear-gradient(90deg, #ff9a7b, #d35400);
            color: white;
            padding: 12px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(211, 84, 0, 0.2);
        }
    </style>
</head>
<body>

<div class="message-card">
    <div class="logo-container">
        <img src="SPC logo.png" alt="SPC Logo">
    </div>

    <h1 class="brand-header">Southern Peach Construction</h1>
    <h1 class="brand-header">Thank You!</h1>

    <div class="image-container">
        <img src="thankyouweb.png" alt="Thank You Image">
    </div>

    <div class="content">
        <p><strong>We’ve received your request.</strong></p>
        <p>A dedicated team member will review your message and reach out to you soon with a response.</p>
    </div>

    <p class="quote">“Building Georgia’s dreams, one peach at a time.”</p>

    <a href="spc_service_request.html" class="btn-back">Submit another request</a>
</div>

</body>
</html>
